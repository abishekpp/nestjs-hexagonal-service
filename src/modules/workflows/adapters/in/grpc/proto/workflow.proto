syntax = "proto3";

package workflow;

service WorkflowService {
  rpc CreateWorkflow (CreateWorkflowRequest) returns (WorkflowResponse);
  rpc ListWorkflows (ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc UpdateWorkflowStatus (UpdateWorkflowStatusRequest) returns (WorkflowResponse);
}

message CreateWorkflowRequest {
  string projectId = 1;
  string subject = 2;
  repeated string documentIds = 3;
  repeated string recipientIds = 4;
  string dueDate = 5;
  string remarks = 6;
  string createdBy = 7;
}

message ListWorkflowsRequest {}

message UpdateWorkflowStatusRequest {
  string id = 1;
  string status = 2;
}

message ListWorkflowsResponse {
  repeated WorkflowResponse workflows = 1;
}

message WorkflowResponse {
  string id = 1;
  string projectId = 2;
  string subject = 3;
  repeated string documentIds = 4;
  repeated string recipientIds = 5;
  string status = 6;
  string dueDate = 7;
  string remarks = 8;
  string createdBy = 9;
  string createdAt = 10;
  string updatedAt = 11;
  string completedAt = 12;
  string transmittalId = 13;
  string transmittalNumber = 14;
}
