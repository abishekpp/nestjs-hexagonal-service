<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" role="img" aria-labelledby="title desc">
  <title id="title">Abstraction dependency through ports</title>
  <desc id="desc">A use case depends on an abstract port, while a concrete adapter implements that port.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="500" fill="#f9fafb"/>
  <text x="560" y="462" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#4b5563">Abstraction Dependency</text>

  <rect x="68" y="90" width="220" height="88" rx="4" fill="#ffffff" stroke="#111827" stroke-width="3" filter="url(#shadow)"/>
  <text x="178" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#111827">Use Case</text>
  <text x="178" y="160" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6b7280">application workflow</text>

  <rect x="610" y="62" width="410" height="120" rx="4" fill="#eff6ff" stroke="#1d4ed8" stroke-width="3" filter="url(#shadow)"/>
  <text x="815" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#111827">Abstract Port</text>
  <text x="815" y="140" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="18" fill="#1f2937">sampleFunction(): Promise&lt;Result&gt;</text>
  <text x="815" y="166" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#2563eb">interface / token contract</text>

  <rect x="650" y="298" width="330" height="98" rx="4" fill="#ffffff" stroke="#111827" stroke-width="3" filter="url(#shadow)"/>
  <text x="815" y="338" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#111827">Concrete Adapter</text>
  <text x="815" y="370" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="17" fill="#1f2937">sampleFunction() { ... }</text>

  <line x1="290" y1="134" x2="598" y2="124" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="442" y="104" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#111827">depends on</text>

  <line x1="815" y1="295" x2="815" y2="191" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <text x="888" y="252" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#2563eb">implements</text>

  <text x="68" y="238" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#374151">Rule:</text>
  <text x="114" y="238" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#374151">application code depends on the port, not the adapter.</text>
  <text x="68" y="270" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#374151">Example:</text>
  <text x="142" y="270" font-family="Consolas, Monaco, monospace" font-size="17" fill="#374151">CreateTransmittalUseCase → TransmittalRepositoryPort ← PrismaTransmittalRepositoryAdapter</text>
</svg>
