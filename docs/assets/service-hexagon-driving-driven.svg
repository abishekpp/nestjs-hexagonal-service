<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">Service hexagon driving and driven sides</title>
  <desc id="desc">The service core is surrounded by driving adapters on the left and driven infrastructure adapters on the right.</desc>
  <defs>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1120" height="640" fill="#262a33"/>
  <line x1="560" y1="32" x2="560" y2="585" stroke="#3f4654" stroke-width="2"/>
  <text x="190" y="70" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#f8fafc">DRIVING SIDE</text>
  <text x="780" y="70" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#f8fafc">DRIVEN SIDE</text>

  <circle cx="560" cy="310" r="235" fill="none" stroke="#3f4654" stroke-width="2"/>
  <polygon points="560,120 715,215 715,405 560,500 405,405 405,215" fill="#2b303b" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="560,225 640,272 640,366 560,413 480,366 480,272" fill="#1f2937" stroke="#34d399" stroke-width="2"/>
  <text x="560" y="308" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Domain</text>
  <text x="560" y="258" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#ffffff">Application</text>

  <rect x="390" y="215" width="54" height="190" rx="2" fill="#fb7185" filter="url(#soft-shadow)"/>
  <text x="421" y="312" transform="rotate(-90 421 312)" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Inbound Ports</text>

  <rect x="676" y="215" width="54" height="190" rx="2" fill="#60a5fa" filter="url(#soft-shadow)"/>
  <text x="707" y="312" transform="rotate(90 707 312)" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Outbound Ports</text>

  <rect x="300" y="232" width="92" height="48" fill="#404653" stroke="#9ca3af" stroke-width="2"/>
  <text x="346" y="263" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#f8fafc">Adapter</text>
  <rect x="300" y="340" width="92" height="48" fill="#404653" stroke="#9ca3af" stroke-width="2"/>
  <text x="346" y="371" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#f8fafc">Adapter</text>

  <rect x="728" y="232" width="92" height="48" fill="#404653" stroke="#9ca3af" stroke-width="2"/>
  <text x="774" y="263" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#f8fafc">Adapter</text>
  <rect x="728" y="340" width="92" height="48" fill="#404653" stroke="#9ca3af" stroke-width="2"/>
  <text x="774" y="371" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#f8fafc">Adapter</text>

  <line x1="165" y1="256" x2="292" y2="256" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow-cyan)"/>
  <line x1="165" y1="364" x2="292" y2="364" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow-cyan)"/>
  <line x1="820" y1="256" x2="950" y2="256" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow-cyan)"/>
  <line x1="820" y1="364" x2="950" y2="364" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrow-cyan)"/>

  <g transform="translate(108,205)">
    <rect x="0" y="0" width="45" height="62" rx="3" fill="#fb7185"/>
    <circle cx="22" cy="96" r="12" fill="#fb7185"/>
    <rect x="10" y="110" width="24" height="58" rx="8" fill="#fb7185"/>
    <line x1="10" y1="125" x2="-3" y2="154" stroke="#fb7185" stroke-width="8" stroke-linecap="round"/>
    <line x1="34" y1="125" x2="47" y2="154" stroke="#fb7185" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g transform="translate(960,223)">
    <path d="M0 0 H45 L65 20 V72 H0 Z" fill="#60a5fa"/>
    <path d="M45 0 V20 H65" fill="#93c5fd"/>
  </g>
  <g transform="translate(960,340)">
    <ellipse cx="32" cy="8" rx="34" ry="10" fill="#93c5fd"/>
    <rect x="-2" y="8" width="68" height="52" fill="#60a5fa"/>
    <ellipse cx="32" cy="60" rx="34" ry="10" fill="#3b82f6"/>
  </g>

  <text x="185" y="188" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#e5e7eb">Client / Gateway / Job</text>
  <text x="968" y="188" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#e5e7eb">Infrastructure</text>
  <text x="560" y="585" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#cbd5e1">Ports keep business rules inside the service core and technical details outside it.</text>
</svg>
